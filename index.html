<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wu Family 收支記錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f0ede8;--color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-error:#a13544;--color-error-highlight:#f3d7db;
  --color-gold:#d19900;--color-gold-highlight:#f5edcc;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 12px rgba(0,0,0,0.09);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;
  --font-body:'Noto Sans HK','PingFang HK',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;
  --sp6:1.5rem;--sp8:2rem;--sp10:2.5rem;--sp12:3rem;
  --t:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#252422;--color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-success:#6daa45;--color-success-highlight:#2a3a22;
  --color-error:#dd6974;--color-error-highlight:#3a2225;
  --color-gold:#e8af34;--color-gold-highlight:#3a3020;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.25);--shadow-md:0 4px 12px rgba(0,0,0,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);min-height:100dvh;}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;}
input,select{font:inherit;color:inherit;}
table{border-collapse:collapse;width:100%;}

.app-header{background:var(--color-surface);border-bottom:1px solid var(--color-divider);padding:var(--sp3) var(--sp6);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.header-logo{display:flex;align-items:center;gap:var(--sp3);}
.header-logo svg{color:var(--color-primary);}
.logo-text{font-size:var(--text-base);font-weight:700;}
.header-actions{display:flex;align-items:center;gap:var(--sp3);}
.sync-badge{display:flex;align-items:center;gap:6px;padding:var(--sp1) var(--sp3);border-radius:2rem;font-size:var(--text-xs);font-weight:600;background:var(--color-surface-offset);border:1px solid var(--color-border);}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-dot.connecting{background:#d19900;animation:pulse 1.2s infinite;}
.sync-dot.live{background:#437a22;}
.sync-dot.offline{background:#a13544;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.theme-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--color-surface-offset);border:1px solid var(--color-border);color:var(--color-text-muted);}

.main-nav{background:var(--color-surface);border-bottom:1px solid var(--color-divider);padding:0 var(--sp6);display:flex;overflow-x:auto;}
.nav-tab{padding:var(--sp3) var(--sp5);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);white-space:nowrap;}
.nav-tab:hover{color:var(--color-text);}
.nav-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);}

.main-content{max-width:1280px;margin:0 auto;padding:var(--sp6);}
.page{display:none;}.page.active{display:block;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--sp4);margin-bottom:var(--sp6);}
.kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--sp5);box-shadow:var(--shadow-sm);}
.kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:500;margin-bottom:var(--sp2);text-transform:uppercase;letter-spacing:.05em;}
.kpi-value{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
.kpi-value.positive{color:var(--color-success);}.kpi-value.negative{color:var(--color-error);}
.kpi-badge{display:inline-block;margin-top:var(--sp2);padding:var(--sp1) var(--sp2);border-radius:var(--radius-sm);font-size:var(--text-xs);font-weight:600;}
.kpi-badge.surplus{background:var(--color-success-highlight);color:var(--color-success);}
.kpi-badge.deficit{background:var(--color-error-highlight);color:var(--color-error);}
.kpi-badge.balanced{background:var(--color-gold-highlight);color:var(--color-gold);}

.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp5);margin-bottom:var(--sp6);}
.member-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--sp6);box-shadow:var(--shadow-sm);}
.member-header{display:flex;align-items:center;gap:var(--sp3);margin-bottom:var(--sp5);}
.member-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;flex-shrink:0;}
.avatar-me{background:#dbeafe;color:#1e40af;}.avatar-husband{background:#dcfce7;color:#15803d;}.avatar-family{background:#fef3c7;color:#d97706;}
.member-name{font-size:var(--text-base);font-weight:700;}.member-subtitle{font-size:var(--text-xs);color:var(--color-text-muted);}
.member-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp3);}
.stat-item{text-align:center;padding:var(--sp3);background:var(--color-surface-offset);border-radius:var(--radius-md);}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--sp1);}
.stat-value{font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;}
.stat-value.income{color:var(--color-success);}.stat-value.expense{color:var(--color-error);}
.stat-value.pos{color:var(--color-success);}.stat-value.neg{color:var(--color-error);}

.form-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--sp6);box-shadow:var(--shadow-sm);margin-bottom:var(--sp6);}
.form-card h2{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--sp5);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--sp4);}
.form-group{display:flex;flex-direction:column;gap:var(--sp2);}
.form-group label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em;}
.form-input{padding:var(--sp3) var(--sp4);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-2);font-size:var(--text-sm);transition:border-color var(--t),box-shadow var(--t);}
.form-input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(1,105,111,.12);}
.form-actions{display:flex;gap:var(--sp3);margin-top:var(--sp5);flex-wrap:wrap;}
.btn{padding:var(--sp3) var(--sp6);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;transition:background var(--t);}
.btn-primary{background:var(--color-primary);color:#fff;}.btn-primary:hover{background:var(--color-primary-hover);}
.btn-ghost{background:transparent;color:var(--color-text-muted);border:1px solid var(--color-border);}.btn-ghost:hover{background:var(--color-surface-offset);}
.btn-danger{background:var(--color-error-highlight);color:var(--color-error);font-size:var(--text-xs);padding:var(--sp1) var(--sp3);}.btn-danger:hover{opacity:.8;}

.table-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:var(--sp6);}
.table-header{padding:var(--sp4) var(--sp6);border-bottom:1px solid var(--color-divider);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp3);}
.table-title{font-size:var(--text-base);font-weight:700;}
.table-filters{display:flex;gap:var(--sp3);flex-wrap:wrap;}
.filter-select{padding:var(--sp2) var(--sp3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-2);font-size:var(--text-xs);font-family:var(--font-body);}
.table-wrap{overflow-x:auto;}
table th{padding:var(--sp3) var(--sp4);text-align:left;font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.05em;background:var(--color-surface-offset);border-bottom:1px solid var(--color-divider);}
table td{padding:var(--sp3) var(--sp4);font-size:var(--text-sm);border-bottom:1px solid var(--color-divider);font-variant-numeric:tabular-nums;}
table tr:last-child td{border-bottom:none;}
table tr:hover td{background:var(--color-surface-offset);}
.badge{display:inline-block;padding:.15rem var(--sp2);border-radius:2rem;font-size:var(--text-xs);font-weight:600;}
.badge-income{background:var(--color-success-highlight);color:var(--color-success);}
.badge-expense{background:var(--color-error-highlight);color:var(--color-error);}
.badge-me{background:#dbeafe;color:#1e40af;}.badge-husband{background:#dcfce7;color:#15803d;}.badge-family{background:#fef3c7;color:#d97706;}
.amount-income{color:var(--color-success);font-weight:600;}.amount-expense{color:var(--color-error);font-weight:600;}
.empty-state{padding:var(--sp12) var(--sp8);text-align:center;color:var(--color-text-muted);font-size:var(--text-sm);}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--sp5);margin-bottom:var(--sp6);}
.chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--sp5);box-shadow:var(--shadow-sm);}
.chart-title{font-size:var(--text-sm);font-weight:700;margin-bottom:var(--sp4);}
.chart-wrap{position:relative;height:240px;}

.summary-card table th:first-child,.summary-card table td:first-child{position:sticky;left:0;background:var(--color-surface-offset);z-index:1;}
.balance-positive{color:var(--color-success);font-weight:700;}.balance-negative{color:var(--color-error);font-weight:700;}

.month-bar{display:flex;align-items:center;gap:var(--sp3);margin-bottom:var(--sp6);flex-wrap:wrap;}
.month-bar label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em;}

.toast{position:fixed;bottom:var(--sp6);left:50%;transform:translateX(-50%) translateY(20px);background:var(--color-text);color:var(--color-bg);padding:var(--sp3) var(--sp6);border-radius:2rem;font-size:var(--text-sm);font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.loading-overlay{position:fixed;inset:0;background:var(--color-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150;gap:var(--sp4);}
.loading-overlay.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:640px){
  .main-content{padding:var(--sp4);}
  .form-grid{grid-template-columns:1fr 1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .member-grid{grid-template-columns:1fr;}
  .chart-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <span style="font-size:var(--text-sm);color:var(--color-text-muted)">連接 Firebase Realtime Database…</span>
</div>

<header class="app-header">
  <div class="header-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="10" width="24" height="16" rx="3" fill="currentColor" opacity=".15"/>
      <path d="M14 2L4 10h20L14 2z" fill="currentColor"/>
      <rect x="8" y="14" width="5" height="5" rx="1" fill="currentColor" opacity=".6"/>
      <rect x="15" y="14" width="5" height="5" rx="1" fill="currentColor" opacity=".6"/>
      <rect x="11" y="19" width="6" height="7" rx="1" fill="currentColor"/>
    </svg>
    <span class="logo-text">Wu Family 收支記錄</span>
  </div>
  <div class="header-actions">
    <div class="sync-badge">
      <div class="sync-dot connecting" id="sync-dot"></div>
      <span id="sync-text">連接中…</span>
    </div>
    <button class="theme-btn" id="theme-btn" aria-label="切換主題">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<nav class="main-nav">
  <button class="nav-tab active" onclick="switchPage('dashboard')">📊 總覽</button>
  <button class="nav-tab" onclick="switchPage('add')">➕ 新增記錄</button>
  <button class="nav-tab" onclick="switchPage('records')">📋 所有記錄</button>
  <button class="nav-tab" onclick="switchPage('monthly')">📅 月結總表</button>
</nav>

<main class="main-content">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="month-bar">
      <label for="dash-month">查閱月份</label>
      <select id="dash-month" class="filter-select" onchange="renderDashboard()"></select>
    </div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="member-grid" id="member-cards"></div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title">收入 vs 支出（當月）</div><div class="chart-wrap"><canvas id="chart-bar"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">支出分類分佈</div><div class="chart-wrap"><canvas id="chart-pie"></canvas></div></div>
    </div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div class="form-card">
      <h2>➕ 新增收支記錄</h2>
      <div class="form-grid">
        <div class="form-group"><label>日期 *</label><input type="date" id="f-date" class="form-input"></div>
        <div class="form-group"><label>成員 *</label>
          <select id="f-member" class="form-input"><option value="我">我</option><option value="先生">先生</option><option value="家庭">家庭</option></select>
        </div>
        <div class="form-group"><label>類別 *</label>
          <select id="f-type" class="form-input"><option value="收入">收入</option><option value="支出">支出</option></select>
        </div>
        <div class="form-group"><label>項目 *</label>
          <select id="f-cat" class="form-input">
            <option>人工</option><option>獎金</option><option>租金</option><option>水電煤</option>
            <option>買餸</option><option>外出用膳</option><option>交通</option><option>醫療</option>
            <option>娛樂</option><option>購物</option><option>教育</option><option>保險</option><option>儲蓄</option><option>其他</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:span 2"><label>說明（可選）</label><input type="text" id="f-desc" class="form-input" placeholder="例如：管理費、門診…"></div>
        <div class="form-group"><label>金額（HK$） *</label><input type="number" id="f-amount" class="form-input" min="0.01" step="0.01" placeholder="0.00"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addRecord()">✅ 儲存並同步</button>
        <button class="btn btn-ghost" onclick="resetForm()">重置</button>
      </div>
    </div>
    <div class="form-card">
      <h2>📦 示範數據</h2>
      <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--sp4)">載入示範數據幫你測試功能，數據會直接寫入 Firebase。</p>
      <button class="btn btn-ghost" onclick="loadSampleData()">載入示範數據</button>
    </div>
  </div>

  <!-- RECORDS -->
  <div class="page" id="page-records">
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">所有收支記錄</span>
        <div class="table-filters">
          <select class="filter-select" id="filter-month" onchange="renderRecords()"><option value="">所有月份</option></select>
          <select class="filter-select" id="filter-member" onchange="renderRecords()"><option value="">所有成員</option><option>我</option><option>先生</option><option>家庭</option></select>
          <select class="filter-select" id="filter-type" onchange="renderRecords()"><option value="">收入+支出</option><option>收入</option><option>支出</option></select>
        </div>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>日期</th><th>成員</th><th>類別</th><th>項目</th><th>說明</th><th>金額</th><th></th></tr></thead>
        <tbody id="records-body"></tbody></table>
      </div>
    </div>
  </div>

  <!-- MONTHLY -->
  <div class="page" id="page-monthly">
    <div class="table-card summary-card">
      <div class="table-header"><span class="table-title">月結總表</span></div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>月份</th><th>我 收入</th><th>我 支出</th><th>我 結餘</th>
          <th>先生 收入</th><th>先生 支出</th><th>先生 結餘</th>
          <th>家庭 收入</th><th>家庭 支出</th><th>家庭 結餘</th>
          <th>全家總結餘</th><th>狀態</th>
        </tr></thead><tbody id="monthly-body"></tbody></table>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ============================================================
     FIREBASE REALTIME DATABASE (v10 modular CDN)
     Config: wu-expense project — Singapore Realtime DB
     Rules 設定（Firebase Console → Realtime Database → Rules）：
     {
       "rules": {
         ".read": true,
         ".write": true
       }
     }
     ============================================================ -->
<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ── Firebase Config ── */
const firebaseConfig = {
  apiKey:            "AIzaSyDODO5ASka-295Ep8wJSDphrrL9ywcikaE",
  authDomain:        "wu-expense.firebaseapp.com",
  projectId:         "wu-expense",
  storageBucket:     "wu-expense.firebasestorage.app",
  messagingSenderId: "244292496725",
  appId:             "1:244292496725:web:d266a8fe265a7769e113dc",
  /* ⚠️ 你喺 Firebase Console → Realtime Database 頁面頂部複製呢條 URL */
  databaseURL: "https://wu-expense-default-rtdb.asia-southeast1.firebasedatabase.app"
};

/* ── Init ── */
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const recRef = ref(db, 'family_records');

/* ── Global state ── */
window.records  = [];
window.barChart = null;
window.pieChart = null;

/* ── Helpers ── */
window.fmt      = n => 'HK$' + Number(n).toLocaleString('zh-HK',{minimumFractionDigits:0,maximumFractionDigits:0});
window.getMonth = d => d.slice(0,7);
window.allMonths= () => [...new Set(records.map(r=>getMonth(r.date)))].sort();
window.showToast= msg => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
};

/* ── Sync badge ── */
function setSync(state, text){
  document.getElementById('sync-dot').className = 'sync-dot '+state;
  document.getElementById('sync-text').textContent = text;
}

/* ── Real-time listener ── */
onValue(recRef, snap => {
  const val = snap.val() || {};
  records = Object.entries(val)
    .map(([id,r])=>({...r, _id:id}))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('loading-overlay').classList.add('hidden');
  setSync('live','🟢 即時同步');
  populateMonthSelectors();
  refreshPage();
}, err=>{
  console.error(err);
  setSync('offline','連接失敗');
  document.getElementById('loading-overlay').classList.add('hidden');
  showToast('⚠️ Firebase 連接失敗，請檢查 databaseURL 及 Rules');
});

/* ── Add ── */
window.addRecord = async () => {
  const date   = document.getElementById('f-date').value;
  const member = document.getElementById('f-member').value;
  const type   = document.getElementById('f-type').value;
  const cat    = document.getElementById('f-cat').value;
  const desc   = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  if(!date)           return showToast('⚠️ 請填日期');
  if(!amount||amount<=0) return showToast('⚠️ 請填有效金額');
  try {
    await push(recRef, {date,member,type,cat,desc,amount,createdAt:new Date().toISOString()});
    resetForm();
    showToast('✅ 已同步到 Firebase！');
  } catch(e){ showToast('❌ 儲存失敗：'+e.message); }
};

/* ── Delete ── */
window.deleteRecord = async id => {
  try {
    await remove(ref(db,'family_records/'+id));
    showToast('🗑 記錄已刪除');
  } catch(e){ showToast('❌ 刪除失敗'); }
};

/* ── Sample data ── */
window.loadSampleData = async () => {
  const m    = new Date().toISOString().slice(0,7);
  const prev = new Date(new Date().getFullYear(), new Date().getMonth()-1, 1).toISOString().slice(0,7);
  const rows = [
    {date:`${m}-01`,member:'我',   type:'收入',cat:'人工',   desc:'本月人工',amount:28000},
    {date:`${m}-01`,member:'先生', type:'收入',cat:'人工',   desc:'本月人工',amount:35000},
    {date:`${m}-03`,member:'家庭', type:'支出',cat:'租金',   desc:'本月租金',amount:16000},
    {date:`${m}-04`,member:'家庭', type:'支出',cat:'水電煤', desc:'',        amount:1200 },
    {date:`${m}-05`,member:'我',   type:'支出',cat:'交通',   desc:'',        amount:900  },
    {date:`${m}-06`,member:'先生', type:'支出',cat:'外出用膳',desc:'',       amount:2000 },
    {date:`${m}-08`,member:'家庭', type:'支出',cat:'買餸',   desc:'超市',    amount:3500 },
    {date:`${m}-10`,member:'我',   type:'支出',cat:'醫療',   desc:'門診',    amount:600  },
    {date:`${m}-12`,member:'先生', type:'支出',cat:'交通',   desc:'',        amount:800  },
    {date:`${m}-15`,member:'家庭', type:'支出',cat:'娛樂',   desc:'電影',    amount:500  },
    {date:`${m}-20`,member:'我',   type:'支出',cat:'購物',   desc:'',        amount:1200 },
    {date:`${prev}-01`,member:'我',   type:'收入',cat:'人工',desc:'上月人工',amount:28000},
    {date:`${prev}-01`,member:'先生', type:'收入',cat:'人工',desc:'上月人工',amount:35000},
    {date:`${prev}-03`,member:'家庭', type:'支出',cat:'租金',desc:'上月租金',amount:16000},
    {date:`${prev}-05`,member:'家庭', type:'支出',cat:'水電煤',desc:'',      amount:1100 },
  ];
  for(const r of rows) await push(recRef, r);
  showToast('📦 示範數據已同步到 Firebase！');
};
</script>

<!-- ============================================================
     UI — Nav / Render / Theme (plain script, reads window.records)
     ============================================================ -->
<script>
/* ── Theme ── */
(()=>{
  const btn  = document.getElementById('theme-btn');
  const root = document.documentElement;
  let t = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark':'light';
  root.setAttribute('data-theme',t);
  btn.addEventListener('click',()=>{
    t = t==='dark'?'light':'dark';
    root.setAttribute('data-theme',t);
    btn.innerHTML = t==='dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    renderDashboard();
  });
})();

/* ── Nav ── */
function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  [...document.querySelectorAll('.nav-tab')][['dashboard','add','records','monthly'].indexOf(id)].classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='records')   renderRecords();
  if(id==='monthly')   renderMonthly();
}
function refreshPage(){
  const active = document.querySelector('.page.active');
  if(!active) return;
  const id = active.id.replace('page-','');
  if(id==='dashboard') renderDashboard();
  if(id==='records')   renderRecords();
  if(id==='monthly')   renderMonthly();
}

/* ── Month Selectors ── */
function populateMonthSelectors(){
  const months = allMonths();
  const now    = new Date().toISOString().slice(0,7);
  const cur    = months.includes(now) ? now : (months[months.length-1]||now);
  const dm = document.getElementById('dash-month');
  const pv = dm.value;
  dm.innerHTML = '';
  months.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; if(m===(pv||cur)) o.selected=true; dm.appendChild(o); });
  if(!dm.value && months.length) dm.value = cur;
  const rm = document.getElementById('filter-month');
  const rp = rm.value;
  rm.innerHTML = '<option value="">所有月份</option>';
  months.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; if(m===rp) o.selected=true; rm.appendChild(o); });
}

/* ── Dashboard ── */
function renderDashboard(){
  populateMonthSelectors();
  const month = document.getElementById('dash-month').value;
  const mR    = (window.records||[]).filter(r=>getMonth(r.date)===month);
  const tInc  = mR.filter(r=>r.type==='收入').reduce((s,r)=>s+r.amount,0);
  const tExp  = mR.filter(r=>r.type==='支出').reduce((s,r)=>s+r.amount,0);
  const net   = tInc-tExp;
  document.getElementById('kpi-grid').innerHTML=[
    {label:'本月總收入',val:tInc,cls:'positive',badge:null},
    {label:'本月總支出',val:tExp,cls:'negative',badge:null},
    {label:'全家總結餘',val:net,cls:net>=0?'positive':'negative',
     badge:net>0?{t:'有盈餘',c:'surplus'}:net<0?{t:'超支',c:'deficit'}:{t:'收支平衡',c:'balanced'}}
  ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${fmt(k.val)}</div>${k.badge?`<span class="kpi-badge ${k.badge.c}">${k.badge.t}</span>`:''}</div>`).join('');

  const MEM=[{k:'我',n:'我',i:'我',a:'avatar-me'},{k:'先生',n:'先生',i:'夫',a:'avatar-husband'},{k:'家庭',n:'家庭共用',i:'家',a:'avatar-family'}];
  document.getElementById('member-cards').innerHTML=MEM.map(m=>{
    const mr=mR.filter(r=>r.member===m.k);
    const inc=mr.filter(r=>r.type==='收入').reduce((s,r)=>s+r.amount,0);
    const exp=mr.filter(r=>r.type==='支出').reduce((s,r)=>s+r.amount,0);
    const bal=inc-exp;
    return `<div class="member-card"><div class="member-header"><div class="member-avatar ${m.a}">${m.i}</div><div><div class="member-name">${m.n}</div><div class="member-subtitle">${month} 收支概況</div></div></div>
    <div class="member-stats"><div class="stat-item"><div class="stat-label">收入</div><div class="stat-value income">${fmt(inc)}</div></div><div class="stat-item"><div class="stat-label">支出</div><div class="stat-value expense">${fmt(exp)}</div></div><div class="stat-item"><div class="stat-label">結餘</div><div class="stat-value ${bal>=0?'pos':'neg'}">${fmt(bal)}</div></div></div></div>`;
  }).join('');

  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  const gc=dk?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const tc=dk?'#cdccca':'#7a7974';
  if(window.barChart) window.barChart.destroy();
  window.barChart=new Chart(document.getElementById('chart-bar').getContext('2d'),{type:'bar',data:{labels:['我','先生','家庭'],datasets:[
    {label:'收入',data:['我','先生','家庭'].map(m=>mR.filter(r=>r.member===m&&r.type==='收入').reduce((s,r)=>s+r.amount,0)),backgroundColor:'rgba(67,122,34,0.75)',borderRadius:6},
    {label:'支出',data:['我','先生','家庭'].map(m=>mR.filter(r=>r.member===m&&r.type==='支出').reduce((s,r)=>s+r.amount,0)),backgroundColor:'rgba(161,53,68,0.75)',borderRadius:6}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:12}}}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc,callback:v=>'$'+v.toLocaleString()},grid:{color:gc}}}}});
  if(window.pieChart) window.pieChart.destroy();
  const ebc={};
  mR.filter(r=>r.type==='支出').forEach(r=>{ebc[r.cat]=(ebc[r.cat]||0)+r.amount;});
  const ck=Object.keys(ebc).sort((a,b)=>ebc[b]-ebc[a]);
  const pc=['#01696f','#437a22','#d19900','#964219','#a13544','#006494','#7a39bb','#4f98a3','#6daa45','#e8af34'];
  window.pieChart=new Chart(document.getElementById('chart-pie').getContext('2d'),{type:'doughnut',data:{labels:ck.length?ck:['無支出記錄'],datasets:[{data:ck.length?ck.map(k=>ebc[k]):[1],backgroundColor:ck.length?pc.slice(0,ck.length):['#d4d1ca'],borderWidth:2,borderColor:dk?'#1c1b19':'#f9f8f5'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:tc,font:{size:11},boxWidth:14,padding:10}}},cutout:'60%'}});
}

/* ── Records ── */
function renderRecords(){
  populateMonthSelectors();
  const fm=document.getElementById('filter-month').value;
  const fmb=document.getElementById('filter-member').value;
  const ft=document.getElementById('filter-type').value;
  let f=(window.records||[]).filter(r=>{
    if(fm && getMonth(r.date)!==fm) return false;
    if(fmb && r.member!==fmb) return false;
    if(ft && r.type!==ft) return false;
    return true;
  });
  const tb=document.getElementById('records-body');
  if(!f.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty-state">暫無記錄，前往「新增記錄」加入數據</div></td></tr>`;return;}
  tb.innerHTML=f.map(r=>`<tr>
    <td>${r.date}</td>
    <td><span class="badge badge-${r.member==='我'?'me':r.member==='先生'?'husband':'family'}">${r.member}</span></td>
    <td><span class="badge ${r.type==='收入'?'badge-income':'badge-expense'}">${r.type}</span></td>
    <td>${r.cat}</td>
    <td style="color:var(--color-text-muted)">${r.desc||'—'}</td>
    <td class="${r.type==='收入'?'amount-income':'amount-expense'}">${r.type==='收入'?'+':'−'}${fmt(r.amount)}</td>
    <td><button class="btn btn-danger" onclick="deleteRecord('${r._id}')">✕</button></td>
  </tr>`).join('');
}

/* ── Monthly ── */
function renderMonthly(){
  const months=allMonths();
  const tb=document.getElementById('monthly-body');
  if(!months.length){tb.innerHTML=`<tr><td colspan="12"><div class="empty-state">未有記錄，請先新增數據</div></td></tr>`;return;}
  const recs=window.records||[];
  tb.innerHTML=months.map(m=>{
    const mr=recs.filter(r=>getMonth(r.date)===m);
    const s=(mb,t)=>mr.filter(r=>r.member===mb&&r.type===t).reduce((a,r)=>a+r.amount,0);
    const mI=s('我','收入'),mE=s('我','支出'),mB=mI-mE;
    const hI=s('先生','收入'),hE=s('先生','支出'),hB=hI-hE;
    const fI=s('家庭','收入'),fE=s('家庭','支出'),fB=fI-fE;
    const tot=mB+hB+fB;
    const stTxt=tot>0?'✅ 有盈餘':tot<0?'⚠️ 超支':'⚖️ 收支平衡';
    const stSt=tot>0?'color:var(--color-success);font-weight:600':tot<0?'color:var(--color-error);font-weight:600':'color:var(--color-gold);font-weight:600';
    const cell=v=>`<td class="${v>=0?'balance-positive':'balance-negative'}">${fmt(v)}</td>`;
    return `<tr><td style="font-weight:600">${m}</td><td class="amount-income">${fmt(mI)}</td><td class="amount-expense">${fmt(mE)}</td>${cell(mB)}<td class="amount-income">${fmt(hI)}</td><td class="amount-expense">${fmt(hE)}</td>${cell(hB)}<td class="amount-income">${fmt(fI)}</td><td class="amount-expense">${fmt(fE)}</td>${cell(fB)}<td class="${tot>=0?'balance-positive':'balance-negative'}" style="font-weight:700">${fmt(tot)}</td><td style="${stSt}">${stTxt}</td></tr>`;
  }).join('');
}

/* ── Reset form ── */
function resetForm(){
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f-desc').value='';
  document.getElementById('f-amount').value='';
}

/* ── Init ── */
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
populateMonthSelectors();
</script>
</body>
</html>
