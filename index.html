<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人收支平衡表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 20px; color: #333; }
  h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 1.5em; }
  .container { max-width: 700px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid; }
  .income h2 { color: #27ae60; border-color: #27ae60; }
  .expense h2 { color: #e74c3c; border-color: #e74c3c; }
  .row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .row label { flex: 1; font-size: 0.9em; color: #555; }
  .row input[type=text] { flex: 1.5; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
  .row input[type=number] { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
  .btn-add { background: none; border: 1px dashed #aaa; border-radius: 6px; padding: 6px 12px; cursor: pointer; color: #888; font-size: 0.85em; width: 100%; margin-top: 4px; }
  .btn-add:hover { background: #f5f5f5; }
  .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1em; padding: 0 4px; }
  .btn-del:hover { color: #e74c3c; }
  .summary { background: #2c3e50; color: white; border-radius: 12px; padding: 20px; }
  .summary h2 { color: white; border-color: #fff; border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 8px; margin-bottom: 14px; font-size: 1em; }
  .sum-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; }
  .sum-row.total { font-size: 1.2em; font-weight: bold; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.3); }
  .positive { color: #2ecc71; }
  .negative { color: #e74c3c; }
  .neutral { color: #f1c40f; }
  .btn-calc { display: block; width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; margin-top: 16px; border-radius: 25px; }
  .btn-calc:hover { background: #2980b9; }
  select { padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; color: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>💰 個人收支平衡表</h1>

  <!-- 月份選擇 -->
  <div class="card" style="padding:12px 20px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label style="font-weight:bold;">📅 月份：</label>
      <select id="year"></select>
      <select id="month">
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
  </div>

  <!-- 收入 -->
  <div class="card income">
    <h2>📈 收入</h2>
    <div id="income-rows">
      <div class="row">
        <input type="text" placeholder="項目（如：薪金）" value="薪金">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
      <div class="row">
        <input type="text" placeholder="項目（如：股息）" value="股息/投資收入">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
    </div>
    <button class="btn-add" onclick="addRow('income-rows', '收入項目')">＋ 新增收入項目</button>
  </div>

  <!-- 支出 -->
  <div class="card expense">
    <h2>📉 支出</h2>
    <div id="expense-rows">
      <div class="row">
        <input type="text" placeholder="項目" value="租金/按揭">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
      <div class="row">
        <input type="text" placeholder="項目" value="飲食">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
      <div class="row">
        <input type="text" placeholder="項目" value="交通">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
      <div class="row">
        <input type="text" placeholder="項目" value="水電煤">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
      <div class="row">
        <input type="text" placeholder="項目" value="娛樂/其他">
        <input type="number" placeholder="金額 (HKD)" min="0">
        <button class="btn-del" onclick="delRow(this)">✕</button>
      </div>
    </div>
    <button class="btn-add" onclick="addRow('expense-rows', '支出項目')">＋ 新增支出項目</button>
  </div>

  <button class="btn-calc" onclick="calculate()">📊 計算收支</button>

  <!-- 結果 -->
  <div class="summary" id="summary" style="display:none; margin-top:16px;">
    <h2>📋 本月結算</h2>
    <div class="sum-row"><span>總收入</span><span id="total-income" class="positive"></span></div>
    <div class="sum-row"><span>總支出</span><span id="total-expense" class="negative"></span></div>
    <div class="sum-row total"><span>結餘</span><span id="balance"></span></div>
    <div style="margin-top:14px; font-size:0.85em; color:rgba(255,255,255,0.7); text-align:center;" id="remark"></div>
  </div>
</div>

<script>
  // 設定年份選單
  const yearSel = document.getElementById('year');
  for(let y = 2024; y <= 2030; y++){
    const opt = document.createElement('option');
    opt.value = y; opt.text = y + '年';
    if(y === 2026) opt.selected = true;
    yearSel.appendChild(opt);
  }
  document.getElementById('month').value = 6;

  function addRow(containerId, placeholder){
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `<input type="text" placeholder="${placeholder}"><input type="number" placeholder="金額 (HKD)" min="0"><button class="btn-del" onclick="delRow(this)">✕</button>`;
    container.appendChild(div);
  }

  function delRow(btn){ btn.parentElement.remove(); }

  function calculate(){
    let totalIn = 0, totalOut = 0;
    document.querySelectorAll('#income-rows .row').forEach(row => {
      const val = parseFloat(row.querySelectorAll('input')[1].value) || 0;
      totalIn += val;
    });
    document.querySelectorAll('#expense-rows .row').forEach(row => {
      const val = parseFloat(row.querySelectorAll('input')[1].value) || 0;
      totalOut += val;
    });
    const balance = totalIn - totalOut;
    const fmt = n => 'HKD ' + n.toLocaleString('zh-HK', {minimumFractionDigits:2});
    document.getElementById('total-income').textContent = fmt(totalIn);
    document.getElementById('total-expense').textContent = fmt(totalOut);
    const balEl = document.getElementById('balance');
    balEl.textContent = fmt(balance);
    balEl.className = balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'neutral';
    let remark = '';
    if(balance > 0) remark = '✅ 本月有盈餘！建議撥 ' + Math.round(balance * 0.3).toLocaleString() + ' HKD 用於儲蓄或投資。';
    else if(balance < 0) remark = '⚠️ 本月超支 ' + Math.abs(balance).toLocaleString() + ' HKD，需要檢視支出項目。';
    else remark = '⚖️ 本月收支剛好平衡。';
    document.getElementById('remark').textContent = remark;
    document.getElementById('summary').style.display = 'block';
    document.getElementById('summary').scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
